name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    env:
      # Opt into Node.js 24 for marketplace actions (checkout, setup-node, …)
      # ahead of the September 2026 deprecation deadline. Removes the
      # "Node.js 20 actions are deprecated" annotation on workflow runs.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Install agent runner dependencies
        if: hashFiles('agent/runner/package.json') != ''
        working-directory: agent/runner
        run: npm ci

      - name: Build agent runner
        if: hashFiles('agent/runner/package.json') != ''
        working-directory: agent/runner
        run: npm run build

      - name: Check shell scripts
        run: bash -n scripts/*.sh
