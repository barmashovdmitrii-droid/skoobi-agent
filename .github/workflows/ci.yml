name: CI

on:
  push:
    branches:
      - main
      - "tier1-privacy-retention"
  pull_request:

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Install agent runner dependencies
        if: hashFiles('agent/runner/package.json') != ''
        working-directory: agent/runner
        run: npm ci

      - name: Build agent runner
        if: hashFiles('agent/runner/package.json') != ''
        working-directory: agent/runner
        run: npm run build

      - name: Check shell scripts
        run: bash -n scripts/*.sh
