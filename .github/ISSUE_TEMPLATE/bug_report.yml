name: Bug report
description: Report a reproducible problem with Skoobi Agent.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets, Telegram bot tokens, `.env` contents, auth files, private chat exports, or runtime databases.

        Private security issues should not be reported in public issues. See `SECURITY.md`.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the smallest safe reproduction you can.
      placeholder: |
        1. Install Skoobi Agent...
        2. Configure...
        3. Send...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "v1.2.16"
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Linux
        - Other
  - type: textarea
    id: logs
    attributes:
      label: Safe logs or output
      description: Redact tokens, user IDs, chat IDs, file paths, secrets, and private messages.
      render: shell
  - type: checkboxes
    id: safety
    attributes:
      label: Safety checklist
      options:
        - label: I did not include secrets, `.env` contents, auth/session files, or private runtime data.
          required: true
        - label: I redacted private Telegram/chat/user identifiers from logs.
          required: true
